<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Panel administrativo de CercaRed para revisar métricas y gestionar servicios."
    />
    <title>Panel admin | CercaRed</title>
    <link rel="icon" type="image/png" href="assets/images/logoencabezado.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <script src="js/services.js" defer></script>
    <script type="module" src="js/admin.js"></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar" aria-label="Navegación principal">
        <a class="brand" href="index.html" aria-label="CercaRed inicio">
          <img class="brand-logo" src="assets/images/logo.png" alt="CercaRed" />
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-label="Abrir menú"
          aria-expanded="false"
          aria-controls="nav-menu"
        >
          <img
            class="nav-toggle-icon"
            src="assets/icons/menu.svg"
            alt=""
            aria-hidden="true"
          />
        </button>

        <div class="nav-menu" id="nav-menu">
          <a href="index.html">Inicio</a>
          <a href="catalog.html">Catálogo</a>
          <a href="saved.html">Guardados</a>
          <a href="ayuda.html">Ayuda</a>
          <a href="auth.html">Acceso</a>
        </div>
      </nav>
    </header>

    <main class="admin-main" id="admin-root">
      <section class="admin-state" aria-live="polite">
        <p>Validando permisos de administrador...</p>
      </section>
    </main>

    <main-footer></main-footer>

    <script src="js/navbar.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
